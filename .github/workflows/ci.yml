name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.100"

      - name: Restore
        run: dotnet restore PV260.Deployment.sln

      - name: Build
        run: dotnet build PV260.Deployment.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test PV260.Deployment.sln --configuration Release --no-build --verbosity normal

